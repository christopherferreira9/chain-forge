name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-release:
    name: Check Release PR
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Release v')
    outputs:
      version: ${{ steps.manifest.outputs.version }}
      rust_crates: ${{ steps.manifest.outputs.rust_crates }}
      npm_solana: ${{ steps.manifest.outputs.npm_solana }}
      npm_bitcoin: ${{ steps.manifest.outputs.npm_bitcoin }}
      bin_cf_solana: ${{ steps.manifest.outputs.bin_cf_solana }}
      bin_cf_bitcoin: ${{ steps.manifest.outputs.bin_cf_bitcoin }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read release manifest
        id: manifest
        run: |
          if [[ ! -f .release.json ]]; then
            echo "::error::Release manifest (.release.json) not found"
            exit 1
          fi
          echo "version=$(jq -r '.version' .release.json)" >> "$GITHUB_OUTPUT"
          echo "rust_crates=$(jq -r '.rust_crates' .release.json)" >> "$GITHUB_OUTPUT"
          echo "npm_solana=$(jq -r '.npm_solana' .release.json)" >> "$GITHUB_OUTPUT"
          echo "npm_bitcoin=$(jq -r '.npm_bitcoin' .release.json)" >> "$GITHUB_OUTPUT"
          echo "bin_cf_solana=$(jq -r '.binaries["cf-solana"]' .release.json)" >> "$GITHUB_OUTPUT"
          echo "bin_cf_bitcoin=$(jq -r '.binaries["cf-bitcoin"]' .release.json)" >> "$GITHUB_OUTPUT"

          echo "### Release Manifest" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .release.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  build-binaries:
    name: Build Binaries
    needs: check-release
    runs-on: ubuntu-latest
    if: needs.check-release.outputs.bin_cf_solana == 'true' || needs.check-release.outputs.bin_cf_bitcoin == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build cf-solana (Linux x86_64)
        if: needs.check-release.outputs.bin_cf_solana == 'true'
        run: |
          cargo build --release -p chain-forge-solana-cli
          strip target/release/cf-solana
          mkdir -p release
          cp target/release/cf-solana release/cf-solana-linux-x86_64

