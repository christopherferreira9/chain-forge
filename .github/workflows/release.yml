  publish-crates:
    name: Publish to crates.io
    needs: check-release
    runs-on: ubuntu-latest
    if: needs.check-release.outputs.rust_crates == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

<<<<<<< Updated upstream
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
=======
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
>>>>>>> Stashed changes

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          # Layer 0: No internal dependencies
          cargo publish -p chain-forge-common
          sleep 15

          # Layer 1: Depends on common
          cargo publish -p chain-forge-config
          sleep 15
          cargo publish -p chain-forge-cli-utils
          sleep 15

          # Layer 2: Chain-specific accounts
          cargo publish -p chain-forge-solana-accounts
          sleep 15
          cargo publish -p chain-forge-bitcoin-accounts
          sleep 15

          # Layer 3: Chain-specific RPC
          cargo publish -p chain-forge-solana-rpc
          sleep 15
          cargo publish -p chain-forge-bitcoin-rpc
          sleep 15

          # Layer 4: Chain-specific core
          cargo publish -p chain-forge-solana-core
          sleep 15
          cargo publish -p chain-forge-bitcoin-core
          sleep 15

          # Layer 5: CLIs and API server
          cargo publish -p chain-forge-solana-cli
          sleep 15
          cargo publish -p chain-forge-bitcoin-cli
          sleep 15
          cargo publish -p chain-forge-api-server

  publish-npm-solana:
    name: Publish @chain-forge/solana to npm
    needs: check-release
    runs-on: ubuntu-latest
    if: needs.check-release.outputs.npm_solana == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Build and publish
        working-directory: npm/@chain-forge/solana
        run: |
          yarn install --immutable
          yarn build
          yarn npm publish --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm-bitcoin:
    name: Publish @chain-forge/bitcoin to npm
    needs: check-release
    runs-on: ubuntu-latest
    if: needs.check-release.outputs.npm_bitcoin == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Build and publish
        working-directory: npm/@chain-forge/bitcoin
        run: |
          yarn install --immutable
          yarn build
          yarn npm publish --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [check-release, build-binaries, publish-crates, publish-npm-solana, publish-npm-bitcoin]
    # Run even if optional jobs were skipped, but not if any failed
    if: always() && needs.check-release.result == 'success' && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create git tag
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Download binaries
        if: needs.build-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z]" until the next "## [" or end of file
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md)
          # Write to file for the release action
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-release.outputs.version }}
          name: v${{ needs.check-release.outputs.version }}
          body_path: release_notes.md
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
